services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "80:80"       # HTTP traffic
      - "8080:8080"   # Traefik dashboard & API
    networks:
      - traefik-net

  app-alpha:
    image: nginx:alpine
    container_name: app-alpha
    networks:
      - traefik-net

  app-beta:
    image: nginx:alpine
    container_name: app-beta
    networks:
      - traefik-net

  app-gamma:
    image: nginx:alpine
    container_name: app-gamma
    networks:
      - traefik-net

networks:
  traefik-net:
    driver: bridge
