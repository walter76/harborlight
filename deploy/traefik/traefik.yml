api:
  insecure: true  # Allows harborlight-backend to reach the dashboard API on port 8080
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@example.com  # <-- REPLACE: your email for Let's Encrypt
      storage: /etc/traefik/acme.json
      tlsChallenge: {}

log:
  level: INFO
